<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner</title>
</head>
<body>
  <h2>QR Code Scanner</h2>
  <video id="preview" width="320" height="240"></video>
  <div id="result">Waiting for scan...</div>

  <!-- Instascan library -->
  <script src="https://cdn.rawgit.com/schmich/instascan-js/master/instascan.min.js"></script>

  <script>
    let scanner = new Instascan.Scanner({ video: document.getElementById('preview') });

    // When a QR code is scanned
    scanner.addListener('scan', function (content) {
      console.log('Scanned: ' + content);
      sendData(content);
    });

    // Start camera
    Instascan.Camera.getCameras().then(function (cameras) {
      if (cameras.length > 0) {
        scanner.start(cameras[0]); // use first camera
      } else {
        console.error('No cameras found.');
        document.getElementById("result").innerText = "No cameras found.";
      }
    }).catch(function (e) {
      console.error(e);
      document.getElementById("result").innerText = "Camera error: " + e;
    });

    // Send scanned data to backend
    function sendData(scannedCode) {
      fetch('https://script.google.com/macros/s/AKfycbw8_v_95vNXvV2Od0bhzldJzEisFBWC88GePcNWuXXHo-tz4JhKZvruTE06PfGu6UK2vw/exec', {
        method: 'POST',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          studentId: scannedCode,
          violationType: "Auto-scan violation",
          remarks: "Logged via QR scan"
        })
      })
      .then(response => response.json())
      .then(data => {
        console.log(data.message);
        document.getElementById("result").innerText =
          "Scanned ID: " + scannedCode + " → " + data.message;
      })
      .catch(err => {
        console.error("Error:", err);
        document.getElementById("result").innerText = "Error: " + err;
      });
    }
  </script>
</body>
</html>
