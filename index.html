<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OLLC Violation Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    #reader { width: 300px; margin: 20px auto; border: 1px solid #ccc; }
    #result { margin-top: 20px; font-weight: bold; white-space: pre-line; }
  </style>
</head>
<body>
  <h2>OLLC Violation Scanner</h2>
  <p>QR Code For Student Violation</p>

  <label for="cameraSelect">Camera:</label>
  <select id="cameraSelect">
    <option value="user">Front</option>
    <option value="environment" selected>Back</option>
  </select>
  <button id="startBtn">Start Scanner</button>

  <div id="reader"></div>
  <div id="result">Waiting for scan...</div>

  <script>
    let scanner;
    let lastScanned = null;

    // 👉 Palitan ito ng Web App URL mo
    const backendUrl = "https://script.google.com/macros/s/AKfycbxyDxJjj4kL5WDxvnrFmAoG3ABO3W5YDm0Xrx5pwo45d1QwMCSjiIr-YOx7Sx1juJZ5WQ/exec";

    document.getElementById("startBtn").addEventListener("click", () => {
      if (scanner) scanner.stop().catch(()=>{});
      const facingMode = document.getElementById("cameraSelect").value;
      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: facingMode },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        decodedText => handleScan(decodedText.trim()),
        errorMessage => console.warn(errorMessage)
      ).catch(err => {
        document.getElementById("result").innerText = "Camera error: " + err;
      });
    });

    function handleScan(studentId) {
      if (studentId === lastScanned) return; // prevent duplicate logs
      lastScanned = studentId;

      document.getElementById("result").innerText = "Logging violation...";

      fetch(backendUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          studentId: studentId,
          violationType: "Auto-scan violation",
          remarks: "Logged via QR scan"
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("HTTP status " + res.status);
        return res.json();
      })
      .then(data => {
        if (data.student && data.student.found) {
          document.getElementById("result").innerText =
            `Scanned ID: ${studentId}\n` +
            `Message: ${data.message}\n` +
            `Name: ${data.student.name}\n` +
            `Course: ${data.student.course}\n` +
            `Level: ${data.student.level}\n` +
            `Section: ${data.student.section}\n` +
            `Violations: ${data.student.totalViolations}\n` +
            `Last: ${data.student.lastViolation}`;
        } else {
          document.getElementById("result").innerText =
            `Scanned ID: ${studentId}\nMessage: ${data.message}`;
        }
      })
      .catch(err => {
        console.error("Fetch error:", err);
        document.getElementById("result").innerText = "Error: " + err;
      });
    }
  </script>
</body>
</html>
