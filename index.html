<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Code Scanner</title>
</head>
<body>
  <h2>QR Code Scanner</h2>
  <video id="preview" width="320" height="240"></video>
  <div id="result">Waiting for scan...</div>

  <!-- Manual input fallback -->
  <input type="text" id="manualInput" placeholder="Enter QR code manually">
  <button onclick="sendData(document.getElementById('manualInput').value)">Submit</button>

  <!-- Instascan library -->
  <script src="https://cdn.rawgit.com/schmich/instascan-js/master/instascan.min.js"></script>

  <script>
    // Initialize scanner
    let scanner = new Instascan.Scanner({ video: document.getElementById('preview') });

    // When a QR code is scanned
    scanner.addListener('scan', function (content) {
      document.getElementById("result").innerText = "Scanned: " + content;
      sendData(content);
    });

    // Try to start camera
    Instascan.Camera.getCameras().then(function (cameras) {
      if (cameras.length > 0) {
        scanner.start(cameras[0]); // use first camera
      } else {
        document.getElementById("result").innerText = "No cameras found. Use manual input.";
      }
    }).catch(function (e) {
      document.getElementById("result").innerText = "Camera error: " + e + ". Use manual input.";
    });

    // Send scanned or manual data to backend
    function sendData(scannedCode) {
      if (!scannedCode) {
        document.getElementById("result").innerText = "Please enter a code.";
        return;
      }

      fetch('https://script.google.com/macros/s/AKfycbw8_v_95vNXvV2Od0bhzldJzEisFBWC88GePcNWuXXHo-tz4JhKZvruTE06PfGu6UK2vw/exec', {
        method: 'POST',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          studentId: scannedCode,
          violationType: "Violation recorded",
          remarks: "Logged via QR system"
        })
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById("result").innerText =
          "ID: " + scannedCode + " → " + data.message;
      })
      .catch(err => {
        document.getElementById("result").innerText = "Error: " + err;
      });
    }
  </script>
</body>
</html>
